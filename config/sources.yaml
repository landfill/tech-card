# 수집 소스 설정 (비(非) API 중심)
#
# 실제 수집 가능한 소스만 포함. 구현된 타입: rss, hnrss, reddit_rss, github_blog, crawl
# crawl: RSS 없는 목록 페이지 HTML 크롤링 (url, 선택: heading_tags, max_items)
# 미구현 타입(rss_bridge, github_trending_rss, firecrawl, headless)은 enabled: false 또는 제거.
# 상세: docs/sources-api-vs-crawl.md, docs/sources-non-api-strategy.md
#
# type별 필드:
#   rss:         url (일반 RSS/Atom)
#   hnrss:       query (키워드), points_min (선택)
#   reddit_rss:  subreddit (서브레딧명만)
#   github_blog: url (GitHub Blog RSS)
#   crawl:       url (목록 페이지), heading_tags (선택, 쉼표 구분 예: h2,h3), max_items (선택)

sources:
  # ========== 1. Hacker News (hnrss.org) ==========
  - id: hn-agentic
    type: hnrss
    query: "Agentic OR Cursor OR Claude"
    points_min: 10
    enabled: true

  # ========== 2. Reddit RSS ==========
  - id: reddit-claudeai
    type: reddit_rss
    subreddit: "ClaudeAI"
    enabled: true
  - id: reddit-cursor
    type: reddit_rss
    subreddit: "Cursor"
    enabled: true
  - id: reddit-ml
    type: reddit_rss
    subreddit: "MachineLearning"
    enabled: true

  # ========== 3. GitHub Blog (RSS) ==========
  - id: github-blog-ai
    type: github_blog
    url: "https://github.blog/feed/"
    enabled: true

  # ========== 4. AI 공식 블로그 (RSS, 검증된 URL만) ==========
  - id: openai-blog
    type: rss
    url: "https://openai.com/blog/rss.xml"
    enabled: true
  # Anthropic 공식 RSS는 현재 404 — 복구 시 enabled: true
  - id: anthropic-news
    type: rss
    url: "https://www.anthropic.com/news.xml"
    enabled: false

  # ========== 5. 미구현 타입 (참고용, enabled: false) ==========
  - id: github-trending-daily
    type: github_trending_rss
    since: daily
    language: ""
    enabled: false
  - id: rss-bridge-x-cursor
    type: rss_bridge
    bridge: x
    search_query: "Cursor OR Claude Code OR agentic coding"
    enabled: false
  - id: firecrawl-cursor-changelog
    type: firecrawl
    url: "https://changelog.cursor.com/"
    watch: true
    enabled: false

  # ========== 6. 크롤링 (RSS 없는 목록 페이지) ==========
  - id: awesomeagents-ai
    type: crawl
    url: "https://awesomeagents.ai/news/"
    # heading_tags: "h2,h3"   # 기본 h2,h3
    max_items: 30
    enabled: true
  - id: platum
    type: crawl
    url: "https://platum.kr/"
    max_items: 30
    enabled: true
  # ========== 7. 기타 RSS (URL 검증 실패 시 disabled) ==========
  # Awesome Agents는 위 crawl로 수집. RSS가 필요한 경우 RSS.app 등으로 생성 후 type: rss 사용.
  - id: etnews-it
    type: rss
    url: "https://feeds.feedburner.com/etnews/technology"
    enabled: false
  - id: etnews-ai
    type: rss
    url: "https://www.etnews.com/rss/section/0301"
    enabled: false
  - id: phocuswire-ai
    type: rss
    url: "https://www.phocuswire.com/feed/"
    enabled: false
